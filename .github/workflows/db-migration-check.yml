name: DB Migration Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  db-migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nebulous_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nebulous_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nebulous_test
      DATABASE_SSL: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migration check
        run: npm run check:db-migration
